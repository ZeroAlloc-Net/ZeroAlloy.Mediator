name: Bug Report
description: Report a bug in ZeroAlloc.Mediator
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```csharp
        public readonly record struct MyRequest : IRequest<string>;
        // ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include compiler errors/warnings if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ZeroAlloc.Mediator Version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET Version
      placeholder: e.g. 10.0.3

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, generated source output, or screenshots.
